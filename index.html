<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project 23</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:black;
overflow:hidden;
color:white;
}

/* =======================
PANTALLA DE ACCESO
======================= */

#acceso{
width:100vw;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.fondoAcceso{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
}

.panel{
position:relative;
z-index:10;
text-align:center;
max-width:700px;
padding:30px;
}

.logo{
width:180px;
margin-bottom:20px;
}

.project{
font-size:18px;
letter-spacing:12px;
margin-bottom:10px;
}

.numero{
font-size:120px;
font-weight:900;
line-height:1;
}

.sub{
letter-spacing:6px;
font-size:12px;
color:#888;
margin-bottom:40px;
}

.access{
font-size:28px;
letter-spacing:8px;
margin-bottom:15px;
}

.access2{
font-size:13px;
letter-spacing:4px;
color:#aaa;
margin-bottom:30px;
}

input{
width:260px;
padding:15px;
background:#111;
border:1px solid #444;
color:white;
font-size:20px;
text-align:center;
border-radius:10px;
}

button{
margin-top:20px;
padding:15px 40px;
background:transparent;
border:1px solid #888;
color:white;
cursor:pointer;
font-size:16px;
letter-spacing:3px;
border-radius:10px;
}

button:hover{
background:#222;
}

#error{
margin-top:20px;
color:#ff4d4d;
height:20px;
}

.credito{
position:absolute;
bottom:20px;
left:20px;
font-size:14px;
color:#888;
}

/* =======================
PANTALLA CONTADOR
======================= */

#contadorPage{
display:none;
width:100vw;
height:100vh;
background:black;
text-align:center;
position:relative;
overflow:auto;
}

.mirada{
width:100%;
max-height:420px;
object-fit:cover;
opacity:0.95;
}

.contenido{
padding:20px;
}

.titulo{
margin-top:15px;
font-size:18px;
letter-spacing:8px;
color:#aaa;
}

#contador{
margin-top:30px;
font-size:55px;
font-weight:bold;
}

.frase{
margin-top:25px;
font-size:24px;
letter-spacing:2px;
}

.footer{
position:absolute;
left:20px;
bottom:20px;
font-size:16px;
color:#888;
}

</style>
</head>

<body>

<!-- PANTALLA ACCESO -->

<div id="acceso">

<img
class="fondoAcceso"
src="WhatsApp Image 2026-07-09 at 3.24.01 PM.jpeg">

<div class="panel">

<img
class="logo"
src="WhatsApp Image 2026-07-09 at 3.33.32 PM.jpeg">

<div class="project">PROJECT</div>

<div class="numero">23</div>

<div class="sub">PAULO LONDRA</div>

<div class="access">
ACCESS REQUIRED
</div>

<div class="access2">
INTRODUCE EL CÓDIGO DE ACCESO
</div>

<input
id="codigo"
type="password"
placeholder="Código">

<br>

<button onclick="entrar()">
INGRESAR
</button>

<div id="error"></div>

</div>

<div class="credito">
PAULO LONDRA
</div>

</div>

<!-- PANTALLA CONTADOR -->

<div id="contadorPage">

<img
class="mirada"
src="WhatsApp Image 2026-07-09 at 3.24.01 PM.jpeg">

<div class="contenido">

<div class="titulo">
PROJECT 23
</div>

<div id="contador"></div>

<div class="frase">
Un león anda suelto en Bogotá
</div>

</div>

<div class="footer">
Paulo Lovers invita
</div>

</div>

<script>

function entrar(){

const codigo =
document.getElementById("codigo").value;

if(codigo === "PL0808"){

document.getElementById("acceso").style.display="none";
document.getElementById("contadorPage").style.display="block";

}else{

document.getElementById("error").innerHTML =
"ACCESS DENIED";

}

}

const fechaObjetivo =
new Date("2026-08-07T00:00:00").getTime();

function actualizarContador(){

const ahora =
new Date().getTime();

const diferencia =
fechaObjetivo - ahora;

if(diferencia <= 0){

document.getElementById("contador").innerHTML =
"00d 00h 00m 00s";

return;
}

const dias =
Math.floor(diferencia/(1000*60*60*24));

const horas =
Math.floor(
(diferencia%(1000*60*60*24))
/
(1000*60*60)
);

const minutos =
Math.floor(
(diferencia%(1000*60*60))
/
(1000*60)
);

const segundos =
Math.floor(
(diferencia%(1000*60))
/
1000
);

document.getElementById("contador").innerHTML =
dias + "d " +
horas + "h " +
minutos + "m " +
segundos + "s";

}

actualizarContador();
setInterval(actualizarContador,1000);

</script>

</body>
</html>
