<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulo Lovers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{overflow:hidden;background:#000}
#acceso{background:#000;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
.panel{text-align:center;color:#fff}
.logo{width:220px;margin-bottom:20px}
.numero{font-size:120px;font-weight:bold}
.nombre{font-size:40px;letter-spacing:4px;margin-bottom:25px}
input{padding:12px;width:220px;font-size:18px;text-align:center;border:none;border-radius:8px}
button{padding:12px 25px;margin-left:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
#error{margin-top:15px;color:#ffd4d4}
#contadorPage{display:none;background:#000;color:#fff;width:100vw;height:100vh;text-align:center;position:relative}
.leon{position:relative;width:100%;height:320px;overflow:hidden}
.leon img{width:100%;height:100%;object-fit:cover;display:block}
#ojos{position:absolute;inset:0;pointer-events:none}
.ojo{
position:absolute;
width:34px;
height:34px;
background:#000;
border-radius:50%;
transform:translate(-50%,-50%);
}
#ojo1{left:31.5%;top:56%;}
#ojo2{left:64.7%;top:56%;}
#tiempo{margin-top:40px;font-size:55px;font-weight:bold}
.frase{margin-top:25px;font-size:24px;letter-spacing:2px}
.footer{position:absolute;bottom:20px;left:20px;color:#888;font-size:18px}
</style>
</head>
<body>

<div id="acceso">
<div class="panel">
<img class="logo" src="WhatsApp Image 2026-07-09 at 3.33.32 PM.jpeg">
<div class="numero">23</div>
<div class="nombre">PAULO LONDRA</div>
<input id="codigo" type="password" placeholder="Código">
<button onclick="entrar()">Entrar</button>
<div id="error"></div>
</div>
</div>

<div id="contadorPage">
<div class="leon">
<img src="WhatsApp Image 2026-07-09 at 3.24.01 PM.jpeg">
<div id="ojos">
<div class="ojo" id="ojo1"></div>
<div class="ojo" id="ojo2"></div>
</div>
</div>
<div id="tiempo"></div>
<div class="frase">Un león anda suelto en Bogotá</div>
<div class="footer">Paulo Lovers invita</div>
</div>

<script>
function entrar(){
 const codigo=document.getElementById("codigo").value;
 if(codigo==="PL0808"){
  acceso.style.display="none";
  contadorPage.style.display="block";
 }else{
  error.textContent="Código incorrecto";
 }
}

const fechaObjetivo=new Date("August 7, 2026 00:00:00").getTime();

setInterval(()=>{
 let d=fechaObjetivo-Date.now();
 let dias=Math.floor(d/86400000);
 let horas=Math.floor((d%86400000)/3600000);
 let minutos=Math.floor((d%3600000)/60000);
 let segundos=Math.floor((d%60000)/1000);
 tiempo.textContent=`${dias}d ${horas}h ${minutos}m ${segundos}s`;
},1000);

document.addEventListener("mousemove",e=>{
 document.querySelectorAll(".ojo").forEach(ojo=>{
   const r=ojo.getBoundingClientRect();
   const cx=r.left+r.width/2;
   const cy=r.top+r.height/2;
   const ang=Math.atan2(e.clientY-cy,e.clientX-cx);
   ojo.style.marginLeft=(Math.cos(ang)*8)+"px";
   ojo.style.marginTop=(Math.sin(ang)*8)+"px";
 });
});
</script>

</body>
</html>
